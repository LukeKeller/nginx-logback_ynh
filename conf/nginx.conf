location __PATH__/ {

    # Per-route logs (this is the "nginx logger" part)
    access_log /var/log/__APP__/access.log;
    error_log  /var/log/__APP__/error.log;

    # This app has no static files: every request — any sub-route, any method —
    # is handled by index.php, which either echoes the request or (at /logs)
    # shows the logs. No try_files / alias games, so deep routes never 404.
    fastcgi_pass unix:/var/run/php/php__PHPVERSION__-fpm-__APP__.sock;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME __INSTALL_DIR__/index.php;
    fastcgi_param SCRIPT_NAME __PATH__/index.php;
    fastcgi_param REMOTE_USER $remote_user;

    # Include SSOWAT user panel.
    include conf.d/yunohost_panel.conf.inc;
}
