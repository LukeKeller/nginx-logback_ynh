location __PATH__/ {

    # Path to source
    alias __INSTALL_DIR__/;

    # Per-route logs (this is the "nginx logger" part)
    access_log /var/log/__APP__/access.log;
    error_log  /var/log/__APP__/error.log;

    index index.php;

    # Send every sub-route / method to index.php so it can echo the request.
    # (QUERY_STRING and the request body are preserved through the internal
    # redirect, so $_GET / $_POST still populate in PHP.)
    try_files $uri $uri/ index.php;

    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        fastcgi_pass unix:/var/run/php/php__PHPVERSION__-fpm-__APP__.sock;

        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param REMOTE_USER $remote_user;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }

    # Include SSOWAT user panel.
    include conf.d/yunohost_panel.conf.inc;
}
