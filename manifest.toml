packaging_format = 2

id = "nginx_logger"
name = "Nginx Logger"
description.en = "Echoes the metadata of any incoming request and shows the per-route nginx access/error logs"

version = "1.0~ynh3"

maintainers = ["Luke"]

[upstream]
license = "AGPL-3.0-or-later"
website = "https://nginx-logs.p10.club"

[integration]
yunohost = ">= 11.2"
architectures = "all"
multi_instance = true
ldap = false
sso = false
disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/"

    [install.init_main_permission]
    help.en = "Keep this as 'visitors' so requests from anywhere are accepted and echoed."
    type = "group"
    default = "visitors"

[resources]
    [resources.system_user]

    [resources.install_dir]
    group = "www-data:r-x"

    [resources.permissions]
    main.url = "/"

    [resources.apt]
    packages = "php8.2-fpm"
